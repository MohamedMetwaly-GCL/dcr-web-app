services:
  - type: web
    name: dcr-web-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: DATABASE_URL
        sync: false          # هتحطها إنت يدوياً من Supabase
      - key: RENDER
        value: "true"
    healthCheckPath: /ping   # Render بيعمل health check هنا
