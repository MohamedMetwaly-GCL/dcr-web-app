services:
  - type: web
    name: dcr-web-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /ping
    envVars:
      - key: DATABASE_URL
        sync: false          # حطها يدوياً من Supabase → Project Settings → Database → Connection string (URI)
      - key: RENDER
        value: "true"
